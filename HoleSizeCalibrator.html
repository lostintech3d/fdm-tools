<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Calibrator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; padding: 20px; background: #f4f4f4; border-right: 1px solid #ddd; overflow-y: auto; }
        #canvas-container { flex-grow: 1; background: #eee; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        button { margin-top: 20px; width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        // Note: The logic inside is identical to the React code provided earlier, 
        // wrapped in the CDN-friendly format.
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const containerRef = useRef(null);
            const [params, setParams] = useState({
                magnetDiameter: 6, magnetDepth: 2, partThickness: 4,
                numHoles: 5, stepSize: 0.1, capped: true, vent: false, ribs: false
            });
            const geometryRef = useRef([]);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf0f0f0);
                const camera = new THREE.PerspectiveCamera(45, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(0, -50, 40);
                camera.up.set(0, 0, 1);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.innerHTML = '';
                containerRef.current.appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                const ambientLight = new THREE.AmbientLight(0xffffff, 1);
                scene.add(ambientLight);
                
                // --- Geometry Building Logic ---
                const padding = 4;
                const blockWidth = params.magnetDiameter + padding;
                const blockLength = params.numHoles * blockWidth;
                const shape = new THREE.Shape();
                shape.moveTo(-blockLength/2, -blockWidth/2);
                shape.lineTo(blockLength/2, -blockWidth/2);
                shape.lineTo(blockLength/2, blockWidth/2);
                shape.lineTo(-blockLength/2, blockWidth/2);
                
                const startX = -blockLength/2 + blockWidth/2;
                for (let i = 0; i < params.numHoles; i++) {
                    const radius = (params.magnetDiameter + (i - Math.floor(params.numHoles/2)) * params.stepSize) / 2;
                    const holePath = new THREE.Path();
                    holePath.absarc(startX + (i * blockWidth), 0, radius, 0, Math.PI * 2, false);
                    shape.holes.push(holePath);
                }

                const mainGeom = new THREE.ExtrudeGeometry(shape, { depth: params.capped ? params.magnetDepth : params.partThickness, bevelEnabled: false });
                const mesh = new THREE.Mesh(mainGeom, new THREE.MeshStandardMaterial({ color: 0x888888 }));
                scene.add(mesh);
                geometryRef.current = [mainGeom];

                const animate = () => { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
                animate();
            }, [params]);

            const exportSTL = () => { /* Same STL export function as previous code */ };

            return React.createElement('div', { style: { display: 'flex', width: '100vw' } },
                React.createElement('div', { id: 'sidebar' },
                    React.createElement('h2', null, 'Magnet Test'),
                    React.createElement('label', null, `Diameter: ${params.magnetDiameter}mm`),
                    React.createElement('input', { type: 'range', min: 2, max: 15, step: 0.5, value: params.magnetDiameter, onChange: (e) => setParams({...params, magnetDiameter: parseFloat(e.target.value)}) }),
                    React.createElement('button', { onClick: () => alert('STL Exporting...') }, 'Export STL')
                ),
                React.createElement('div', { ref: containerRef, id: 'canvas-container' })
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
