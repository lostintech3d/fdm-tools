<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Calibrator v3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
                "three/examples/jsm/loaders/FontLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/FontLoader.js",
                "three/examples/jsm/geometries/TextGeometry": "https://unpkg.com/three@0.160.0/examples/jsm/geometries/TextGeometry.js"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #121212; color: #eee; }
        #sidebar { width: 320px; padding: 20px; background: #1e1e1e; border-right: 1px solid #333; overflow-y: auto; }
        #canvas-container { flex-grow: 1; background: #000; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #007bff; }
        button { margin-top: 15px; width: 100%; padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        .val { float: right; color: #007bff; }
        .check-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="checkbox"] { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
        import { FontLoader } from 'three/examples/jsm/loaders/FontLoader.js';
        import { TextGeometry } from 'three/examples/jsm/geometries/TextGeometry.js';

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const containerRef = useRef(null);
            const [params, setParams] = useState({
                magnetDiameter: 6,
                magnetDepth: 2.5,
                partThickness: 5,
                numHoles: 5,
                stepSize: 0.1,
                capped: true,
                vent: true,
                ribs: false,
                engraveLabels: true
            });
            
            const meshesRef = useRef([]);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x121212);
                const camera = new THREE.PerspectiveCamera(40, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(0, -100, 70);
                camera.up.set(0, 0, 1);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.innerHTML = '';
                containerRef.current.appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
                const sun = new THREE.DirectionalLight(0xffffff, 1.5);
                sun.position.set(10, -30, 50);
                scene.add(sun);

                // --- Geometry Building ---
                const padding = 6;
                const blockWidth = params.magnetDiameter + padding;
                const blockLength = params.numHoles * blockWidth;
                const r = blockWidth / 2;
                const L = (blockLength - blockWidth) / 2;

                const createPill = () => {
                    const s = new THREE.Shape();
                    s.absarc(-L, 0, r, Math.PI / 2, -Math.PI / 2, false);
                    s.absarc(L, 0, r, -Math.PI / 2, Math.PI / 2, false);
                    return s;
                };

                const mainShape = createPill();
                const startX = -L;
                const material = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.4 });

                // Holes logic
                for (let i = 0; i < params.numHoles; i++) {
                    const offset = (i - Math.floor(params.numHoles/2)) * params.stepSize;
                    const holeR = (params.magnetDiameter + offset) / 2;
                    const cx = startX + (i * blockWidth);
                    
                    const holePath = new THREE.Path();
                    if (params.ribs) {
                        for (let j = 0; j <= 64; j++) {
                            const angle = (j / 64) * Math.PI * 2;
                            const modR = (j % 8 < 2) ? holeR - 0.25 : holeR;
                            holePath.lineTo(cx + Math.cos(angle) * modR, Math.sin(angle) * modR);
                        }
                    } else {
                        holePath.absarc(cx, 0, holeR, 0, Math.PI * 2, false);
                    }
                    mainShape.holes.push(holePath);
                }

                // Main body
                const bodyDepth = params.capped ? params.magnetDepth : params.partThickness;
                const mainGeom = new THREE.ExtrudeGeometry(mainShape, { depth: bodyDepth, bevelEnabled: false });
                const mainMesh = new THREE.Mesh(mainGeom, material);
                scene.add(mainMesh);
                meshesRef.current = [mainMesh];

                // Capped base
                if (params.capped && params.partThickness > params.magnetDepth) {
                    const baseS = createPill();
                    if (params.vent) {
                        for (let i = 0; i < params.numHoles; i++) {
                            const v = new THREE.Path();
                            v.absarc(startX + (i * blockWidth), 0, 0.8, 0, Math.PI * 2, false);
                            baseS.holes.push(v);
                        }
                    }
                    const baseGeom = new THREE.ExtrudeGeometry(baseS, { depth: params.partThickness - params.magnetDepth, bevelEnabled: false });
                    baseGeom.translate(0, 0, -(params.partThickness - params.magnetDepth));
                    const baseMesh = new THREE.Mesh(baseGeom, material);
                    scene.add(baseMesh);
                    meshesRef.current.push(baseMesh);
                }

                // Add physical text labels (Simple implementation for STL export)
                // Note: Real 3D text in STL requires a font JSON. We use a proxy group for the render.
                const loader = new FontLoader();
                loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', (font) => {
                    for (let i = 0; i < params.numHoles; i++) {
                        const offset = (i - Math.floor(params.numHoles/2)) * params.stepSize;
                        const labelStr = (offset >= 0 ? "+" : "") + offset.toFixed(2);
                        const textGeo = new TextGeometry(labelStr, { font: font, size: 2, height: 0.5 });
                        textGeo.center();
                        const cx = startX + (i * blockWidth);
                        const tMesh = new THREE.Mesh(textGeo, new THREE.MeshStandardMaterial({color: 0x007bff}));
                        tMesh.position.set(cx, blockWidth/2 - 2, bodyDepth);
                        scene.add(tMesh);
                        if (params.engraveLabels) meshesRef.current.push(tMesh);
                    }
                });

                const animate = () => { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
                animate();
                return () => renderer.dispose();
            }, [params]);

            const exportSTL = () => {
                let stl = 'solid magnet_test\n';
                meshesRef.current.forEach(m => {
                    const geo = m.geometry.toNonIndexed();
                    const pos = geo.attributes.position;
                    m.updateMatrixWorld();
                    for (let i = 0; i < pos.count; i += 3) {
                        const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).applyMatrix4(m.matrixWorld);
                        const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1)).applyMatrix4(m.matrixWorld);
                        const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2)).applyMatrix4(m.matrixWorld);
                        const normal = new THREE.Vector3().crossVectors(v2.clone().sub(v1), v3.clone().sub(v1)).normalize();
                        stl += `facet normal ${normal.x} ${normal.y} ${normal.z}\n  outer loop\n`;
                        stl += `    vertex ${v1.x} ${v1.y} ${v1.z}\n    vertex ${v2.x} ${v2.y} ${v2.z}\n    vertex ${v3.x} ${v3.y} ${v3.z}\n`;
                        stl += `  endloop\nendfacet\n`;
                    }
                });
                stl += 'endsolid magnet_test';
                const blob = new Blob([stl], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `magnet_calibrator_${params.magnetDiameter}mm.stl`;
                a.click();
            };

            const ui = React.createElement;
            return ui('div', { style: { display: 'flex', width: '100vw' } },
                ui('div', { id: 'sidebar' },
                    ui('h2', null, 'Vibe Calibrator'),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Magnet Dia', ui('span', { className: 'val' }, params.magnetDiameter + 'mm')),
                        ui('input', { type: 'range', min: 2, max: 20, step: 0.1, value: params.magnetDiameter, onChange: e => setParams({...params, magnetDiameter: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Magnet Depth', ui('span', { className: 'val' }, params.magnetDepth + 'mm')),
                        ui('input', { type: 'range', min: 1, max: 10, step: 0.1, value: params.magnetDepth, onChange: e => setParams({...params, magnetDepth: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Total Thickness', ui('span', { className: 'val' }, params.partThickness + 'mm')),
                        ui('input', { type: 'range', min: 2, max: 15, step: 0.5, value: params.partThickness, onChange: e => setParams({...params, partThickness: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Step Size', ui('span', { className: 'val' }, params.stepSize + 'mm')),
                        ui('input', { type: 'range', min: 0.01, max: 0.25, step: 0.01, value: params.stepSize, onChange: e => setParams({...params, stepSize: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'check-row' }, ui('input', { type: 'checkbox', checked: params.capped, onChange: e => setParams({...params, capped: e.target.checked}) }), 'Capped Base'),
                    ui('div', { className: 'check-row' }, ui('input', { type: 'checkbox', checked: params.vent, disabled: !params.capped, onChange: e => setParams({...params, vent: e.target.checked}) }), 'Vent Holes'),
                    ui('div', { className: 'check-row' }, ui('input', { type: 'checkbox', checked: params.ribs, onChange: e => setParams({...params, ribs: e.target.checked}) }), 'Crush Ribs'),
                    ui('div', { className: 'check-row' }, ui('input', { type: 'checkbox', checked: params.engraveLabels, onChange: e => setParams({...params, engraveLabels: e.target.checked}) }), 'Print Labels on Part'),
                    ui('button', { onClick: exportSTL }, 'Download STL')
                ),
                ui('div', { ref: containerRef, id: 'canvas-container' })
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
