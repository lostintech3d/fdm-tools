<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Calibrator v12</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #121212; color: #eee; overflow: hidden; }
        #sidebar { width: 340px; padding: 20px; background: #1e1e1e; border-right: 1px solid #333; overflow-y: auto; flex-shrink: 0; }
        #canvas-container { flex-grow: 1; background: #000; position: relative; }
        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .input-wrap { display: flex; gap: 8px; align-items: center; }
        input[type="range"] { flex-grow: 1; accent-color: #007bff; }
        input[type="number"] { width: 60px; background: #2a2a2a; border: 1px solid #444; color: #007bff; padding: 3px; border-radius: 4px; font-size: 0.8rem; text-align: center; }
        button { margin-top: 15px; width: 100%; padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        .check-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; }
        input[type="checkbox"] { margin-right: 10px; }
        
        #labels-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hole-label { position: absolute; color: #007bff; font-weight: bold; font-size: 11px; transform: translate(-50%, -100%); text-shadow: 1px 1px 2px black; background: rgba(0,0,0,0.4); padding: 2px 4px; border-radius: 3px; border: 1px solid rgba(0,123,255,0.3); }
        .disabled-text { color: #555; text-decoration: line-through; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const containerRef = useRef(null);
            const labelContainerRef = useRef(null);
            const [params, setParams] = useState({
                magnetDiameter: 6.0,
                magnetDepth: 2.5,
                partThickness: 5.0,
                numHoles: 5,
                stepSize: 0.1,
                capped: true,
                vent: true,
                ribs: true,
                swageLip: false,
                blindSide: false
            });
            
            const state = useRef({ scene: null, camera: null, renderer: null, controls: null, meshes: [] });

            // Geometry Helpers
            const padding = 6;
            const blockWidth = params.magnetDiameter + padding;
            const L = (params.numHoles * blockWidth) / 2;
            const r = blockWidth / 2;

            const getHoleX = (i) => -L + (blockWidth / 2) + (i * blockWidth);
            const getHoleR = (i) => (params.magnetDiameter + ((i - Math.floor(params.numHoles/2)) * params.stepSize)) / 2;

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x121212);
                const camera = new THREE.PerspectiveCamera(40, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(0, -120, 90);
                camera.up.set(0, 0, 1);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
                const sun = new THREE.DirectionalLight(0xffffff, 1.5);
                sun.position.set(10, -30, 50);
                scene.add(sun);

                state.current = { scene, camera, renderer, controls, meshes: [] };

                const animate = () => {
                    state.current.anim = requestAnimationFrame(animate);
                    controls.update();
                    
                    if (labelContainerRef.current) {
                        const labels = labelContainerRef.current.children;
                        const topZ = params.blindSide ? params.magnetDepth + 0.8 : (params.capped ? params.magnetDepth : params.partThickness);
                        
                        Array.from(labels).forEach((label, i) => {
                            const v = new THREE.Vector3(getHoleX(i), 0, topZ);
                            v.project(camera);
                            label.style.left = `${(v.x * 0.5 + 0.5) * containerRef.current.clientWidth}px`;
                            label.style.top = `${(v.y * -0.5 + 0.5) * containerRef.current.clientHeight - 10}px`;
                            label.style.opacity = v.z > 1 ? 0 : 1;
                        });
                    }
                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    cancelAnimationFrame(state.current.anim);
                    renderer.dispose();
                };
            }, []);

            useEffect(() => {
                const { scene, meshes } = state.current;
                if (!scene) return;
                
                meshes.forEach(m => scene.remove(m));
                state.current.meshes = [];

                const createPill = () => {
                    const s = new THREE.Shape();
                    s.moveTo(-L, r);
                    s.lineTo(L, r);
                    s.absarc(L, 0, r, Math.PI/2, -Math.PI/2, true);
                    s.lineTo(-L, -r);
                    s.absarc(-L, 0, r, -Math.PI/2, Math.PI/2, true);
                    return s;
                };

                const topCapT = params.blindSide ? 0.8 : 0;
                const bodyD = params.magnetDepth;
                const baseT = Math.max(0.4, params.partThickness - params.magnetDepth - topCapT);
                
                let mainShapes = [];

                if (params.blindSide) {
                    if (params.vent) {
                        // Generate individual comb pillars to allow push-out tunnels on the opposing wall
                        for (let p = 0; p <= params.numHoles; p++) {
                            const s = new THREE.Shape();
                            
                            // Left boundary
                            if (p === 0) {
                                s.moveTo(-L, -r);
                                s.absarc(-L, 0, r, -Math.PI/2, Math.PI/2, true);
                            } else {
                                const cx = getHoleX(p - 1);
                                const holeR = getHoleR(p - 1);
                                const vw = Math.min(1.0, holeR * 0.5); // Ensure vent width doesn't break geometry
                                const theta = Math.acos(vw / holeR);
                                s.moveTo(cx + holeR, -r);
                                s.lineTo(cx + holeR, 0);
                                s.absarc(cx, 0, holeR, 0, theta, false);
                                s.lineTo(cx + vw, r);
                            }
                            
                            // Top boundary
                            if (p === 0) {
                                s.lineTo(getHoleX(0) - Math.min(1.0, getHoleR(0) * 0.5), r);
                            } else if (p === params.numHoles) {
                                s.lineTo(L, r);
                            } else {
                                s.lineTo(getHoleX(p) - Math.min(1.0, getHoleR(p) * 0.5), r);
                            }
                            
                            // Right boundary
                            if (p === params.numHoles) {
                                s.absarc(L, 0, r, Math.PI/2, -Math.PI/2, true);
                            } else {
                                const cx = getHoleX(p);
                                const holeR = getHoleR(p);
                                const vw = Math.min(1.0, holeR * 0.5);
                                const theta = Math.acos(vw / holeR);
                                s.lineTo(cx - vw, holeR * Math.sin(theta));
                                s.absarc(cx, 0, holeR, Math.PI - theta, Math.PI, false);
                                s.lineTo(cx - holeR, -r);
                            }
                            
                            mainShapes.push(s);
                        }
                    } else {
                        // Standard solid blind side shape
                        const s = new THREE.Shape();
                        s.moveTo(-L, r);
                        s.lineTo(L, r);
                        s.absarc(L, 0, r, Math.PI/2, -Math.PI/2, true);
                        for (let i = params.numHoles - 1; i >= 0; i--) {
                            const cx = getHoleX(i);
                            const holeR = getHoleR(i);
                            s.lineTo(cx + holeR, -r);
                            s.lineTo(cx + holeR, 0);
                            s.absarc(cx, 0, holeR, 0, Math.PI, false);
                            s.lineTo(cx - holeR, -r);
                        }
                        s.lineTo(-L, -r);
                        s.absarc(-L, 0, r, -Math.PI/2, Math.PI/2, true);
                        mainShapes.push(s);
                    }
                } else {
                    // Standard Top-Down Mode
                    const s = createPill();
                    for (let i = 0; i < params.numHoles; i++) {
                        const cx = getHoleX(i);
                        const holeR = getHoleR(i);
                        const hPath = new THREE.Path();
                        
                        if (params.ribs) {
                            const rd = 0.35; 
                            const rw = 0.15; 
                            for (let step = 0; step <= 360; step++) {
                                const ang = (step * Math.PI) / 180;
                                let R = holeR;
                                const isRib = [0, Math.PI/2, Math.PI, 3*Math.PI/2].some(base => Math.abs(ang - base) < rw);
                                if (isRib) R -= rd;
                                if (step === 0) hPath.moveTo(cx + Math.cos(ang) * R, Math.sin(ang) * R);
                                else hPath.lineTo(cx + Math.cos(ang) * R, Math.sin(ang) * R);
                            }
                        } else {
                            hPath.absarc(cx, 0, holeR, 0, Math.PI * 2, false);
                        }
                        s.holes.push(hPath);

                        if (params.swageLip) {
                            const lipShape = new THREE.Shape();
                            lipShape.absarc(cx, 0, holeR + 0.6, 0, Math.PI * 2, false);
                            const lipHole = new THREE.Path();
                            lipHole.absarc(cx, 0, holeR, 0, Math.PI * 2, false);
                            lipShape.holes.push(lipHole);
                            const lipMesh = new THREE.Mesh(new THREE.ExtrudeGeometry(lipShape, { depth: 0.8, bevelEnabled: false }), new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.5 }));
                            lipMesh.position.z = bodyD;
                            scene.add(lipMesh);
                            state.current.meshes.push(lipMesh);
                        }
                    }
                    mainShapes.push(s);
                }

                const mat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.5 });
                
                // 1. Mid Layer (Magnet Body)
                const m1 = new THREE.Mesh(new THREE.ExtrudeGeometry(mainShapes, { depth: bodyD, bevelEnabled: false }), mat);
                scene.add(m1);
                state.current.meshes.push(m1);

                // 2. Base Cap
                if (params.capped || params.blindSide) {
                    const baseS = createPill();
                    // In blind side mode, vent holes are on the back wall, not the base cap
                    if (params.vent && !params.blindSide) {
                        for (let i = 0; i < params.numHoles; i++) {
                            const v = new THREE.Path();
                            v.absarc(getHoleX(i), 0, 0.9, 0, Math.PI * 2, false);
                            baseS.holes.push(v);
                        }
                    }
                    const m2 = new THREE.Mesh(new THREE.ExtrudeGeometry(baseS, { depth: baseT, bevelEnabled: false }), mat);
                    m2.position.z = -baseT;
                    scene.add(m2);
                    state.current.meshes.push(m2);
                }

                // 3. Top Cap (For Blind Side Entry)
                if (params.blindSide) {
                    const topS = createPill();
                    const m3 = new THREE.Mesh(new THREE.ExtrudeGeometry(topS, { depth: topCapT, bevelEnabled: false }), mat);
                    m3.position.z = bodyD;
                    scene.add(m3);
                    state.current.meshes.push(m3);
                }

            }, [params]);

            const exportSTL = () => {
                let stl = 'solid magnet_test\n';
                state.current.meshes.forEach(m => {
                    const pos = m.geometry.toNonIndexed().attributes.position;
                    m.updateMatrixWorld();
                    for (let i = 0; i < pos.count; i += 3) {
                        const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).applyMatrix4(m.matrixWorld);
                        const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1)).applyMatrix4(m.matrixWorld);
                        const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2)).applyMatrix4(m.matrixWorld);
                        const n = new THREE.Vector3().crossVectors(v2.clone().sub(v1), v3.clone().sub(v1)).normalize();
                        stl += `facet normal ${n.x} ${n.y} ${n.z}\n  outer loop\n    vertex ${v1.x} ${v1.y} ${v1.z}\n    vertex ${v2.x} ${v2.y} ${v2.z}\n    vertex ${v3.x} ${v3.y} ${v3.z}\n  endloop\nendfacet\n`;
                    }
                });
                stl += 'endsolid magnet_test';
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([stl], { type: 'text/plain' }));
                link.download = `calibrator_${params.magnetDiameter}mm.stl`;
                link.click();
            };

            const ui = React.createElement;
            const Row = ({label, id, min, max, step}) => ui('div', { className: 'control-group' },
                ui('div', { className: 'label-row' }, ui('label', null, label), ui('input', { type: 'number', step, value: params[id], onChange: e => setParams({...params, [id]: parseFloat(e.target.value) || 0}) })),
                ui('div', { className: 'input-wrap' }, ui('input', { type: 'range', min, max, step, value: params[id], onChange: e => setParams({...params, [id]: parseFloat(e.target.value) || 0}) }))
            );

            return ui('div', { style: { display: 'flex', width: '100vw' } },
                ui('div', { id: 'sidebar' },
                    ui('h2', { style: { fontWeight: 300, fontSize: '1.4rem' } }, 'Magnet Calibrator'),
                    Row({ label: 'Base Magnet Diameter', id: 'magnetDiameter', min: 2, max: 20, step: 0.1 }),
                    Row({ label: 'Magnet Depth', id: 'magnetDepth', min: 1, max: 10, step: 0.1 }),
                    Row({ label: 'Total Thickness', id: 'partThickness', min: 2, max: 20, step: 0.5 }),
                    Row({ label: 'Step Size (Offset)', id: 'stepSize', min: 0.01, max: 0.5, step: 0.01 }),
                    
                    ui('div', { className: 'check-row', onClick: () => setParams({...params, blindSide: !params.blindSide}) }, ui('input', { type: 'checkbox', checked: params.blindSide, readOnly: true }), 'Blind Side Entry'),
                    
                    ui('div', { className: `check-row ${params.blindSide ? 'disabled-text' : ''}`, onClick: () => !params.blindSide && setParams({...params, capped: !params.capped}) }, 
                        ui('input', { type: 'checkbox', checked: params.blindSide ? true : params.capped, readOnly: true, disabled: params.blindSide }), 'Capped Base'),
                    ui('div', { className: 'check-row', onClick: () => setParams({...params, vent: !params.vent}) }, 
                        ui('input', { type: 'checkbox', checked: params.vent, readOnly: true }), 'Vent Holes'),
                    ui('div', { className: `check-row ${params.blindSide ? 'disabled-text' : ''}`, onClick: () => !params.blindSide && setParams({...params, ribs: !params.ribs}) }, 
                        ui('input', { type: 'checkbox', checked: params.blindSide ? false : params.ribs, readOnly: true, disabled: params.blindSide }), 'Square Crush Ribs'),
                    ui('div', { className: `check-row ${params.blindSide ? 'disabled-text' : ''}`, onClick: () => !params.blindSide && setParams({...params, swageLip: !params.swageLip}) }, 
                        ui('input', { type: 'checkbox', checked: params.blindSide ? false : params.swageLip, readOnly: true, disabled: params.blindSide }), 'Swage Lip (Heat Staking)'),
                    ui('button', { onClick: exportSTL }, 'Download STL')
                ),
                ui('div', { ref: containerRef, id: 'canvas-container' },
                    ui('div', { id: 'labels-overlay', ref: labelContainerRef }, 
                        Array.from({length: params.numHoles}).map((_, i) => {
                            const offset = (i - Math.floor(params.numHoles/2)) * params.stepSize;
                            const absSize = (params.magnetDiameter + offset).toFixed(2);
                            return ui('div', { key: i, className: 'hole-label' }, `${absSize}mm`);
                        })
                    )
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
