<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Fit Calibrator v2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #121212; color: #e0e0e0; }
        #sidebar { width: 320px; padding: 25px; background: #1e1e1e; border-right: 1px solid #333; overflow-y: auto; z-index: 10; }
        #canvas-container { flex-grow: 1; background: #000; position: relative; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { width: 100%; accent-color: #007bff; }
        input[type="checkbox"] { margin-right: 10px; }
        button { margin-top: 10px; width: 100%; padding: 14px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        .val { float: right; color: #007bff; }
        h2 { margin: 0 0 20px 0; font-size: 1.4rem; font-weight: 300; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const containerRef = useRef(null);
            const [params, setParams] = useState({
                magnetDiameter: 6,
                magnetDepth: 2,
                partThickness: 4,
                numHoles: 5,
                stepSize: 0.1,
                capped: true,
                vent: true,
                ribs: false
            });
            
            const meshesRef = useRef([]);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x121212);
                
                const camera = new THREE.PerspectiveCamera(40, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(0, -80, 60);
                camera.up.set(0, 0, 1);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.innerHTML = '';
                containerRef.current.appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                
                // LIGHTING FIX: Using Hemisphere + Directional for better 3D definition
                scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
                const light = new THREE.DirectionalLight(0xffffff, 2);
                light.position.set(10, -20, 30);
                scene.add(light);

                // GEOMETRY
                const padding = 5;
                const blockWidth = params.magnetDiameter + padding;
                const blockLength = params.numHoles * blockWidth;
                const r = blockWidth / 2;
                const L = (blockLength - blockWidth) / 2;

                const createPillShape = () => {
                    const s = new THREE.Shape();
                    s.absarc(-L, 0, r, Math.PI / 2, -Math.PI / 2, false);
                    s.absarc(L, 0, r, -Math.PI / 2, Math.PI / 2, false);
                    return s;
                };

                const mainShape = createPillShape();
                const startX = -L;

                for (let i = 0; i < params.numHoles; i++) {
                    const holeR = (params.magnetDiameter + (i - Math.floor(params.numHoles/2)) * params.stepSize) / 2;
                    const cx = startX + (i * blockWidth);
                    const holePath = new THREE.Path();
                    
                    if (params.ribs) {
                        for (let j = 0; j <= 64; j++) {
                            const angle = (j / 64) * Math.PI * 2;
                            const modR = (j % 8 < 2) ? holeR - 0.2 : holeR;
                            const px = cx + Math.cos(angle) * modR;
                            const py = Math.sin(angle) * modR;
                            if (j === 0) holePath.moveTo(px, py); else holePath.lineTo(px, py);
                        }
                    } else {
                        holePath.absarc(cx, 0, holeR, 0, Math.PI * 2, false);
                    }
                    mainShape.holes.push(holePath);
                }

                const material = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.2 });
                const mainGeom = new THREE.ExtrudeGeometry(mainShape, { depth: params.capped ? params.magnetDepth : params.partThickness, bevelEnabled: false });
                const mainMesh = new THREE.Mesh(mainGeom, material);
                scene.add(mainMesh);
                meshesRef.current = [mainMesh];

                if (params.capped) {
                    const baseShape = createPillShape();
                    if (params.vent) {
                        for (let i = 0; i < params.numHoles; i++) {
                            const vHole = new THREE.Path();
                            vHole.absarc(startX + (i * blockWidth), 0, 0.8, 0, Math.PI * 2, false);
                            baseShape.holes.push(vHole);
                        }
                    }
                    const baseGeom = new THREE.ExtrudeGeometry(baseShape, { depth: params.partThickness - params.magnetDepth, bevelEnabled: false });
                    baseGeom.translate(0, 0, -(params.partThickness - params.magnetDepth));
                    const baseMesh = new THREE.Mesh(baseGeom, material);
                    scene.add(baseMesh);
                    meshesRef.current.push(baseMesh);
                }

                const animate = () => { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
                animate();
                return () => renderer.dispose();
            }, [params]);

            const exportSTL = () => {
                let stl = 'solid magnet_calibrator\n';
                meshesRef.current.forEach(mesh => {
                    const geo = mesh.geometry.toNonIndexed();
                    const pos = geo.attributes.position;
                    for (let i = 0; i < pos.count; i += 3) {
                        const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).applyMatrix4(mesh.matrixWorld);
                        const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1)).applyMatrix4(mesh.matrixWorld);
                        const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2)).applyMatrix4(mesh.matrixWorld);
                        const normal = new THREE.Vector3().crossVectors(v2.clone().sub(v1), v3.clone().sub(v1)).normalize();
                        stl += `facet normal ${normal.x} ${normal.y} ${normal.z}\n  outer loop\n`;
                        stl += `    vertex ${v1.x} ${v1.y} ${v1.z}\n    vertex ${v2.x} ${v2.y} ${v2.z}\n    vertex ${v3.x} ${v3.y} ${v3.z}\n`;
                        stl += `  endloop\nendfacet\n`;
                    }
                });
                stl += 'endsolid magnet_calibrator';
                const blob = new Blob([stl], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `magnet_test_${params.magnetDiameter}mm.stl`;
                link.click();
            };

            const ui = React.createElement;
            return ui('div', { style: { display: 'flex', width: '100vw' } },
                ui('div', { id: 'sidebar' },
                    ui('h2', null, 'Magnet Calibrator'),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Magnet Dia', ui('span', { className: 'val' }, params.magnetDiameter + 'mm')),
                        ui('input', { type: 'range', min: 2, max: 20, step: 0.1, value: params.magnetDiameter, onChange: e => setParams({...params, magnetDiameter: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Step Size', ui('span', { className: 'val' }, params.stepSize + 'mm')),
                        ui('input', { type: 'range', min: 0.01, max: 0.3, step: 0.01, value: params.stepSize, onChange: e => setParams({...params, stepSize: parseFloat(e.target.value)}) })),
                    ui('div', { className: 'control-group' }, 
                        ui('label', null, 'Part Thickness', ui('span', { className: 'val' }, params.partThickness + 'mm')),
                        ui('input', { type: 'range', min: 2, max: 15, step: 0.5, value: params.partThickness, onChange: e => setParams({...params, partThickness: parseFloat(e.target.value)}) })),
                    ui('div', null, 
                        ui('label', null, ui('input', { type: 'checkbox', checked: params.capped, onChange: e => setParams({...params, capped: e.target.checked}) }), 'Capped Base'),
                        ui('label', null, ui('input', { type: 'checkbox', checked: params.vent, disabled: !params.capped, onChange: e => setParams({...params, vent: e.target.checked}) }), 'Vent Holes'),
                        ui('label', null, ui('input', { type: 'checkbox', checked: params.ribs, onChange: e => setParams({...params, ribs: e.target.checked}) }), 'Crush Ribs')),
                    ui('button', { onClick: exportSTL }, 'Download STL')
                ),
                ui('div', { ref: containerRef, id: 'canvas-container' })
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
