<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Physics Vibe Coder</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-color: #070a13;
            --card-bg: rgba(20, 26, 43, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.5);
            --warning-red: #ef4444;
            --text-main: #ffffff;
            --text-muted: #8a96aa;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #101c36 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-weight: 900; font-size: 2rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: -1px; }
        h1 span { color: var(--accent-blue); }

        .controls-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .radio-label {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all 0.2s;
            font-weight: 700;
            text-transform: uppercase;
        }

        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 15px var(--accent-blue-glow);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .input-group { margin-bottom: 20px; }
        .input-label { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block;
            font-weight: 700;
        }

        .val-display {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .val-display input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            outline: none;
        }

        .unit { font-size: 0.8rem; color: var(--text-muted); margin-left: 5px; }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .locked { opacity: 0.3; pointer-events: none; }

        /* Results Pane Styling */
        .results-list { list-style: none; padding: 0; margin: 0; }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--card-border);
        }
        .result-item:last-child { border: none; }
        .res-label { font-size: 0.8rem; color: var(--text-muted); }
        .res-val { font-weight: 800; font-size: 1.1rem; }
        .warning { color: var(--warning-red); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        .chart-box { min-height: 400px; display: flex; align-items: center; }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
            .main-grid > div { order: 2; }
            .main-grid .chart-box { order: 1; }
        }
    </style>
</head>
<body>

    <h1>Vibe <span>/</span> Physics <span>/</span> Code</h1>

    <div class="controls-header">
        <input type="radio" id="s-speed" name="solve" value="speed" checked>
        <label for="s-speed" class="radio-label">Solve Speed</label>

        <input type="radio" id="s-flow" name="solve" value="flow">
        <label for="s-flow" class="radio-label">Solve Flow</label>

        <input type="radio" id="s-height" name="solve" value="height">
        <label for="s-height" class="radio-label">Solve Layer</label>
    </div>

    <div class="main-grid">
        <div class="card">
            <div class="input-group" id="ctrl-speed">
                <span class="input-label">Print Speed</span>
                <div class="val-display">
                    <input type="number" id="n-speed" value="100">
                    <span class="unit">mm/s</span>
                </div>
                <input type="range" id="r-speed" min="10" max="500" value="100">
            </div>

            <div class="input-group" id="ctrl-flow">
                <span class="input-label">Flow Rate</span>
                <div class="val-display">
                    <input type="number" id="n-flow" value="8.00" step="0.1">
                    <span class="unit">mm³/s</span>
                </div>
                <input type="range" id="r-flow" min="0.5" max="50" step="0.1" value="8.0">
            </div>

            <div class="input-group" id="ctrl-height">
                <span class="input-label">Layer Height</span>
                <div class="val-display">
                    <input type="number" id="n-height" value="0.20" step="0.01">
                    <span class="unit">mm</span>
                </div>
                <input type="range" id="r-height" min="0.05" max="1.0" step="0.01" value="0.20">
            </div>

            <div class="input-group">
                <span class="input-label">Line Width</span>
                <div class="val-display">
                    <input type="number" id="n-width" value="0.40" step="0.01">
                    <span class="unit">mm</span>
                </div>
                <input type="range" id="r-width" min="0.1" max="2.0" step="0.01" value="0.40">
            </div>
        </div>

        <div class="card chart-box">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="card">
            <div class="input-label" style="margin-bottom: 20px;">System Results</div>
            <ul class="results-list">
                <li class="result-item">
                    <span class="res-label">Calculated Flow</span>
                    <span class="res-val" id="res-flow">0.00 mm³/s</span>
                </li>
                <li class="result-item">
                    <span class="res-label">Calculated Speed</span>
                    <span class="res-val" id="res-speed">0.0 mm/s</span>
                </li>
                <li class="result-item">
                    <span class="res-label">Layer Height</span>
                    <span class="res-val" id="res-height">0.00 mm</span>
                </li>
                <li class="result-item">
                    <span class="res-label">Extrusion Area</span>
                    <span class="res-val" id="res-area">0.00 mm²</span>
                </li>
                <li class="result-item">
                    <span class="res-label">Volumetric Limit</span>
                    <span class="res-val" id="res-limit">15.0 mm³/s</span>
                </li>
            </ul>
        </div>
    </div>

    <script>
        let chart;
        const state = { speed: 100, flow: 8, height: 0.2, width: 0.4 };
        
        const inputs = {
            speed: { n: document.getElementById('n-speed'), r: document.getElementById('r-speed'), c: document.getElementById('ctrl-speed') },
            flow: { n: document.getElementById('n-flow'), r: document.getElementById('r-flow'), c: document.getElementById('ctrl-flow') },
            height: { n: document.getElementById('n-height'), r: document.getElementById('r-height'), c: document.getElementById('ctrl-height') },
            width: { n: document.getElementById('n-width'), r: document.getElementById('r-width') }
        };

        function init() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Flow/Speed Curve',
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.1,
                        borderWidth: 2,
                        data: []
                    }, {
                        label: 'Operating Point',
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        data: [{x: 0, y: 0}]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', min: 0, max: 500, title: { display: true, text: 'Speed (mm/s)', color: '#8a96aa' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { min: 0, max: 30, title: { display: true, text: 'Flow (mm³/s)', color: '#8a96aa' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // Listeners
            document.querySelectorAll('input[name="solve"]').forEach(r => r.addEventListener('change', updateLogic));
            Object.keys(inputs).forEach(key => {
                [inputs[key].n, inputs[key].r].forEach(el => {
                    el.addEventListener('input', (e) => {
                        const val = parseFloat(e.target.value);
                        inputs[key].n.value = val;
                        inputs[key].r.value = val;
                        calculate();
                    });
                });
            });

            updateLogic();
        }

        function updateLogic() {
            const solveFor = document.querySelector('input[name="solve"]:checked').value;
            // Visually lock the solved parameter
            Object.keys(inputs).forEach(key => {
                if(inputs[key].c) inputs[key].c.classList.toggle('locked', key === solveFor);
            });
            calculate();
        }

        function calculate() {
            const solveFor = document.querySelector('input[name="solve"]:checked').value;
            
            // Read non-solved
            if(solveFor !== 'speed') state.speed = parseFloat(inputs.speed.n.value) || 1;
            if(solveFor !== 'flow') state.flow = parseFloat(inputs.flow.n.value) || 0.1;
            if(solveFor !== 'height') state.height = parseFloat(inputs.height.n.value) || 0.01;
            state.width = parseFloat(inputs.width.n.value) || 0.1;

            const area = state.width * state.height;

            if (solveFor === 'speed') {
                state.speed = state.flow / area;
                inputs.speed.n.value = state.speed.toFixed(1);
                inputs.speed.r.value = state.speed;
            } else if (solveFor === 'flow') {
                state.flow = state.speed * area;
                inputs.flow.n.value = state.flow.toFixed(2);
                inputs.flow.r.value = state.flow;
            } else if (solveFor === 'height') {
                state.height = state.flow / (state.speed * state.width);
                inputs.height.n.value = state.height.toFixed(3);
                inputs.height.r.value = state.height;
            }

            updateUI(area);
        }

        function updateUI(area) {
            document.getElementById('res-flow').innerText = `${state.flow.toFixed(2)} mm³/s`;
            document.getElementById('res-speed').innerText = `${state.speed.toFixed(1)} mm/s`;
            document.getElementById('res-height').innerText = `${state.height.toFixed(2)} mm`;
            document.getElementById('res-area').innerText = `${area.toFixed(4)} mm²`;

            // Warning Check
            const flowEl = document.getElementById('res-flow');
            if (state.flow > 15) flowEl.classList.add('warning');
            else flowEl.classList.remove('warning');

            // Update Chart
            const curve = [];
            for (let v = 0; v <= 500; v += 25) curve.push({ x: v, y: v * area });
            
            chart.data.datasets[0].data = curve;
            chart.data.datasets[1].data = [{ x: state.speed, y: state.flow }];
            
            // Stabilize Y-axis: Snap to increments of 10, min 30
            const maxNeeded = Math.max(30, state.flow * 1.5);
            chart.options.scales.y.max = Math.ceil(maxNeeded / 10) * 10;
            
            chart.update('none');
        }

        init();
    </script>
</body>
</html>
